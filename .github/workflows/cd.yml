on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write
  issues: write
  checks: read
  statuses: read

jobs:
  release:
    name: Releases
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
    - uses: actions/checkout@v6
    - name: Wait for Garnix evaluation
      uses: lewagon/wait-on-check-action@v1.5.0
      with:
        check-regexp: 'Evaluate flake\.nix'
        ref: ${{ github.sha }}
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-no-checks: false
    - name: Wait for Garnix package(s)
      uses: lewagon/wait-on-check-action@v1.5.0
      with:
        check-regexp: 'package.*'
        ref: ${{ github.sha }}
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        fail-on-no-checks: false
    - name: Install Nix
      uses: DeterminateSystems/nix-installer-action@v21
      with:
        extra-conf: |
          extra-substituters = https://cache.garnix.io
          extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
    - name: Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@v13
    - name: Build
      run: nix build .#smart-piano -o result
    - name: Prepare Artifact
      run: tar -chzvf smart-piano-engine.tar.gz -C result .
    - name: Publish Rolling Release
      if: github.ref == 'refs/heads/main'
      run: |
        DATE=$(date -u +%Y-%m-%d)
        TAG="rolling-$DATE"
        if gh release view "$TAG" >/dev/null 2>&1; then
          echo "Rolling release for $DATE already exists. Updating artifacts."
          gh release upload "$TAG" smart-piano-engine.tar.gz --clobber
        else
          # Cleanup old rolling releases (> 7 days)
          gh release list --limit 100 | grep "rolling-" | while read -r line; do
            OLD_TAG=$(echo "$line" | awk '{print $1}')
            OLD_DATE=${OLD_TAG#rolling-}
            # Simple date comparison (YYYY-MM-DD)
            if [ "$(date -d "$OLD_DATE" +%s)" -lt "$(date -d "7 days ago" +%s)" ]; then
               gh release delete "$OLD_TAG" --yes --cleanup-tag
            fi
          done
          gh release create "$TAG" smart-piano-engine.tar.gz --title "Rolling $DATE" --notes "Automated rolling release for $DATE" --prerelease
        fi
    - name: Publish Stable Release
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        gh release create "$TAG" smart-piano-engine.tar.gz --title "SmartPiano $TAG" --notes "Release $TAG"
