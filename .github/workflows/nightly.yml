on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: write
  issues: write
  checks: read
  statuses: read

jobs:
  nightly:
    name: Nightly Maintenance
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            extra-substituters = https://cache.garnix.io
            extra-trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g=
      - name: Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
      - name: Update flake inputs
        id: update
        run: |
          nix flake update
          if ! git diff --exit-code flake.lock; then
            echo "updated=true" >> $GITHUB_OUTPUT
          fi
      - name: Create Pull Request for Updates
        if: steps.update.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore: update flake.lock'
          title: 'chore: update flake.lock (Nightly)'
          body: Nightly update of flake inputs, verified by `nix flake check`
          branch: nightly/update-deps
          delete-branch: true
      - name: Audit Dependencies & Flake Check
        run: |
          nix flake check --all-systems --no-build
          # We can also add specifically the coverage check as a sanity check
          nix build .#checks.x86_64-linux.coverage
      - name: Mutation Testing Placeholder
        run: |
          echo "Mutation testing is currently a placeholder"
          echo "Future: Integrate with a C++ mutation testing tool like Mull"
          nix build
